# =============================================================================
# Alkemio Claude Code Router — LiteLLM Proxy Config
# =============================================================================
#
# Two active pools:
#   claude — Anthropic (frontier, complex reasoning)
#   qwen   — Alibaba DashScope (cost-optimised, routine tasks)
#
# Optional local pools (uncomment when self-hosted hardware is available):
#   local-primary  — vLLM on RTX PRO 6000
#   local-fallback — DGX Spark
#
# Authentication (both use coding subscriptions):
#   Claude  → Claude Code Max subscription, OAuth token forwarded by LiteLLM
#   Alibaba → DashScope Coding Plan subscription (sk-sp-xxx token)
#
# Usage:
#   docker compose up -d
#   export ANTHROPIC_BASE_URL=http://localhost:4891
#   claude
# =============================================================================

model_list:
  # ---------------------------------------------------------------------------
  # Claude (Anthropic) — frontier model, Claude Code Max subscription
  # ---------------------------------------------------------------------------
  # Interactive coding, complex reasoning, agentic workflows.
  # Auth: OAuth token from Claude Code's browser login, forwarded by LiteLLM.
  - model_name: claude
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514

  # ---------------------------------------------------------------------------
  # Qwen (Alibaba DashScope) — cost-optimised, DashScope Coding Plan
  # ---------------------------------------------------------------------------
  # Routine tasks: infra, client work, batch operations, project management.
  # Auth: Coding Plan token (sk-sp-xxx). Anthropic-compatible endpoint.
  - model_name: qwen
    litellm_params:
      model: anthropic/qwen3.5-plus
      api_base: https://coding-intl.dashscope.aliyuncs.com/apps/anthropic
      api_key: os.environ/DASHSCOPE_AUTH_TOKEN

  # ---------------------------------------------------------------------------
  # Local — self-hosted hardware (uncomment when deployed)
  # ---------------------------------------------------------------------------
  # Primary workstation: vLLM on RTX PRO 6000 GPUs
  # Models: European preferred (Mistral), then open-weight (Qwen, Llama)
  #
  # - model_name: local-primary
  #   litellm_params:
  #     model: anthropic/mistral-large
  #     api_base: http://workstation.local:8000/v1
  #     api_key: none
  #   model_info:
  #     id: local-vllm-primary
  #
  # DGX Spark fallback (~38 tok/s):
  #
  # - model_name: local-fallback
  #   litellm_params:
  #     model: openai/mistral-large
  #     api_base: http://dgx-spark.local:8000/v1
  #     api_key: none
  #   model_info:
  #     id: local-dgx-spark

general_settings:
  # Forward Claude Code's OAuth token to Anthropic (Max subscription).
  forward_client_headers_to_llm_api: true
  # Load the custom routing strategy.
  custom_routing_strategy: "task_router.TaskAwareRouter"
  custom_routing_strategy_path: "./task_router.py"

router_settings:
  routing_strategy: "simple-shuffle"
  enable_pre_call_checks: true
  num_retries: 2
  timeout: 120
  fallbacks:
    - qwen: ["claude"]
    # Uncomment when local hardware is available:
    # - local-primary: ["local-fallback", "claude"]
    # - local-fallback: ["claude"]

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  set_verbose: false
  drop_params: true
